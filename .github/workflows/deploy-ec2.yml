name: Deploy to EC2

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP_DIR="${{ secrets.EC2_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              if [ -d ~/EduAI ]; then
                APP_DIR=~/EduAI
              elif [ -d ~/rag-system ]; then
                APP_DIR=~/rag-system
              else
                echo "ERROR: No ~/EduAI or ~/rag-system folder on EC2."
                echo "SSH in and run: git clone https://github.com/YOUR_USER/EduAI.git ~/EduAI"
                exit 1
              fi
            fi
            cd "$APP_DIR"
            chmod +x scripts/deploy-ec2.sh
            ./scripts/deploy-ec2.sh

      - name: Verify public health endpoint
        run: |
          curl -fsS "http://${{ secrets.EC2_HOST }}/backend/health"
